name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - main

jobs:
  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Create Artifact Folder
        run: mkdir -p ../artifacts/frontend-build

      - name: Copy Build Files
        run: cp -r dist/* ../artifacts/frontend-build/

      - name: Commit Build Artifacts
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add ../artifacts/frontend-build
          git commit -m "Updated frontend build artifacts" || echo "No changes to commit"
          git push
      - name: Verify Build Success
        run: echo "Frontend CI Pipeline Passed"
